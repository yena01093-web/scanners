<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JC Hotel Room Bar & Comfort Food</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
  :root {
    --navy: #0B1120; --navy2: #131C2E; --navy3: #1C2840;
    --gold: #F0A500; --gold2: #C8860A; --white: #F5F7FA;
    --gray: #8A97AA; --red: #FF4D4D;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans KR', sans-serif; background: var(--navy); color: var(--white); min-height: 100vh; padding-bottom: 100px; }

  .guest-header {
    background: linear-gradient(180deg, #060C18 0%, var(--navy) 100%);
    padding: 24px 20px 0; text-align: center; position: sticky; top: 0; z-index: 100;
    border-bottom: 1px solid var(--navy3);
  }
  .hotel-name { font-size: 1.6rem; font-weight: 700; padding-top: 8px; }
  .hotel-name span { color: var(--gold); }
  .room-badge {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--navy3); border: 1px solid var(--gold2);
    color: var(--gold); padding: 5px 14px; border-radius: 20px;
    font-size: 0.85rem; font-weight: 700; margin-top: 10px;
  }
  .tabs { display: flex; padding: 0 16px; margin: 16px 0 0; border-bottom: 1px solid var(--navy3); }
  .tab { flex: 1; padding: 12px 4px; text-align: center; font-size: 0.8rem; color: var(--gray);
    cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.2s; white-space: nowrap; }
  .tab.active { color: var(--gold); border-bottom-color: var(--gold); font-weight: 700; }

  .hot-banner {
    margin: 16px; background: linear-gradient(135deg, var(--navy3), #0F1E35);
    border: 1px solid #2A3F5F; border-radius: 12px; padding: 14px 16px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .hot-tag { background: var(--red); color: white; font-size: 0.65rem; font-weight: 700;
    padding: 2px 8px; border-radius: 4px; letter-spacing: 1px; margin-bottom: 6px; display: inline-block; }
  .hot-text { font-size: 0.9rem; font-weight: 500; }

  .menu-section { padding: 0 16px 20px; }
  .menu-card {
    background: var(--navy2); border: 1px solid var(--navy3); border-radius: 14px;
    overflow: hidden; margin-bottom: 14px; display: flex; align-items: stretch; transition: border-color 0.2s;
  }
  .menu-card:hover { border-color: var(--gold2); }
  .menu-card.sold-out { opacity: 0.55; }
  .menu-img-box { width: 110px; height: 110px; flex-shrink: 0; background: var(--navy3);
    display: flex; align-items: center; justify-content: center; font-size: 2.2rem; overflow: hidden; }
  .menu-img-box img { width: 100%; height: 100%; object-fit: cover; }
  .menu-body { padding: 14px; flex: 1; display: flex; flex-direction: column; justify-content: space-between; }
  .menu-tags { display: flex; gap: 5px; margin-bottom: 6px; flex-wrap: wrap; }
  .tag { font-size: 0.65rem; padding: 2px 8px; border-radius: 4px; font-weight: 700; }
  .tag-drink { background: rgba(59,130,246,0.2); color: #60A5FA; border: 1px solid rgba(59,130,246,0.3); }
  .tag-food { background: rgba(34,197,94,0.2); color: #4ADE80; border: 1px solid rgba(34,197,94,0.3); }
  .tag-hot { background: rgba(255,77,77,0.2); color: #FF8080; border: 1px solid rgba(255,77,77,0.3); }
  .tag-set { background: rgba(168,85,247,0.2); color: #C084FC; border: 1px solid rgba(168,85,247,0.3); }
  .tag-new-item { background: rgba(34,197,94,0.2); color: #4ADE80; border: 1px solid rgba(34,197,94,0.3); }
  .tag-rec { background: rgba(240,165,0,0.2); color: var(--gold); border: 1px solid rgba(240,165,0,0.3); }
  .menu-name { font-size: 1rem; font-weight: 700; margin-bottom: 4px; }
  .menu-desc { font-size: 0.78rem; color: var(--gray); line-height: 1.4; margin-bottom: 10px; }
  .menu-bottom { display: flex; align-items: center; justify-content: space-between; }
  .menu-price { color: var(--gold); font-weight: 700; font-size: 1rem; }
  .add-btn { background: var(--gold); color: #000; border: none; padding: 7px 16px;
    border-radius: 20px; font-size: 0.82rem; font-weight: 700; cursor: pointer; font-family: inherit; }
  .sold-out-btn { background: var(--navy3); color: var(--gray); border: none; padding: 7px 16px;
    border-radius: 20px; font-size: 0.82rem; font-weight: 700; font-family: inherit; cursor: default; }

  .cart-bar {
    position: fixed; bottom: 0; left: 0; right: 0; background: #060C18;
    border-top: 1px solid var(--navy3); padding: 14px 20px;
  }
  .cart-label { font-size: 0.7rem; color: var(--gray); letter-spacing: 1px; margin-bottom: 6px; }
  .cart-bottom { display: flex; align-items: center; justify-content: space-between; }
  .cart-total { font-size: 1.2rem; font-weight: 700; color: var(--gold); }
  .cart-items-preview { font-size: 0.75rem; color: var(--gray); margin-top: 2px; }
  .order-btn { background: var(--gold); color: #000; border: none; padding: 12px 24px;
    border-radius: 12px; font-size: 0.9rem; font-weight: 700; cursor: pointer; font-family: inherit; }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8);
    z-index: 2000; align-items: center; justify-content: center; }
  .modal-overlay.show { display: flex; }
  .modal { background: var(--navy2); border: 1px solid var(--navy3); border-radius: 20px;
    padding: 28px 24px; width: 340px; max-width: 90vw; }
  .modal h3 { font-size: 1.1rem; font-weight: 700; margin-bottom: 8px; }
  .modal p { font-size: 0.85rem; color: var(--gray); margin-bottom: 20px; }
  .modal input, .modal textarea { width: 100%; background: var(--navy3); border: 1px solid #2A3F5F; color: var(--white);
    border-radius: 10px; padding: 12px 14px; font-size: 0.9rem; font-family: inherit; margin-bottom: 12px; outline: none; }
  .modal input:focus, .modal textarea:focus { border-color: var(--gold); }
  .modal textarea { height: 80px; resize: none; }
  .modal-btns { display: flex; gap: 10px; }
  .btn-cancel { flex: 1; background: var(--navy3); color: var(--gray); border: none; padding: 12px; border-radius: 10px; cursor: pointer; font-family: inherit; }
  .btn-confirm { flex: 2; background: var(--gold); color: #000; border: none; padding: 12px; border-radius: 10px; cursor: pointer; font-family: inherit; font-weight: 700; }
  .pay-label { display: flex; align-items: center; gap: 6px; background: var(--navy3); padding: 10px 12px; border-radius: 8px; cursor: pointer; font-size: 0.85rem; flex: 1; }

  .toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
    background: var(--navy2); border: 1px solid var(--gold2); color: var(--white);
    padding: 12px 24px; border-radius: 12px; font-size: 0.85rem; font-weight: 500;
    z-index: 3000; opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap; }
  .toast.show { opacity: 1; }
  .loading-msg { text-align: center; padding: 40px; color: var(--gray); font-size: 0.9rem; }
</style>
</head>
<body>

<div class="guest-header">
  <div class="hotel-name">JC <span>룸바</span> & 야식</div>
  <div class="room-badge" id="room-badge">🛎 Room --호</div>
  <div class="tabs">
    <div class="tab active" onclick="switchTab('all',this)">전체</div>
    <div class="tab" onclick="switchTab('drink',this)">🍷 주류 & 음료</div>
    <div class="tab" onclick="switchTab('food',this)">🍕 5분 퀵안주</div>
  </div>
</div>

<div class="hot-banner">
  <div>
    <div class="hot-tag">HOT ISSUE</div>
    <div class="hot-text">미니바 전 품목 주문 즉시 5분 데우기 달리버리</div>
  </div>
  <div style="font-size:1.8rem">⚡</div>
</div>

<div class="menu-section" id="menu-list">
  <div class="loading-msg">메뉴 불러오는 중...</div>
</div>

<div class="cart-bar">
  <div class="cart-label">SHOPPING CART</div>
  <div class="cart-bottom">
    <div>
      <div class="cart-total" id="cart-total">₩0</div>
      <div class="cart-items-preview" id="cart-preview">메뉴를 선택해 주세요</div>
    </div>
    <button class="order-btn" onclick="openOrderModal()">🛒 바로 주문하기</button>
  </div>
</div>

<div class="modal-overlay" id="order-modal">
  <div class="modal">
    <h3>주문 확인</h3>
    <p>성함과 요청사항을 입력해 주세요</p>
    <input type="text" id="guest-name-input" placeholder="성함 (예: 김○○)" maxlength="10">
    <textarea id="guest-memo-input" placeholder="요청사항 (예: 얼음컵 2개 더 챙겨주세요)"></textarea>
    <div style="margin-bottom:12px;">
      <div style="font-size:0.8rem;color:var(--gray);margin-bottom:8px;">결제 방식</div>
      <div style="display:flex;gap:8px;">
        <label class="pay-label"><input type="radio" name="payment" value="room" checked> 객실 후불청구</label>
        <label class="pay-label"><input type="radio" name="payment" value="prepaid"> 삼성페이 선결제</label>
      </div>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeOrderModal()">취소</button>
      <button class="btn-confirm" onclick="submitOrder()">주문 접수</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDSFNwHWreQ5py9lq8fINEMAmGj_wbEqjE",
    authDomain: "jc-hotel-roombar-27c58.firebaseapp.com",
    projectId: "jc-hotel-roombar-27c58",
    storageBucket: "jc-hotel-roombar-27c58.firebasestorage.app",
    messagingSenderId: "866392617860",
    appId: "1:866392617860:web:33d262c60779179f55e3d1"
  };
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const urlParams = new URLSearchParams(window.location.search);
  const roomNumber = urlParams.get('room') || '000';
  document.getElementById('room-badge').textContent = `🛎 Room ${roomNumber}호`;

  let menus = [];
  let cart = {};
  let currentTab = 'all';

  const tagMap = {
    drink: ['tag-drink','주류'], food: ['tag-food','간편식'],
    hot: ['tag-hot','🔥인기'], set: ['tag-set','🎁세트'],
    'new-item': ['tag-new-item','✨신메뉴'], rec: ['tag-rec','👍추천']
  };

  // Firestore에서 메뉴 실시간 로드
  const q = query(collection(db, 'menus'), orderBy('createdAt', 'asc'));
  onSnapshot(q, (snapshot) => {
    menus = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
    renderMenu();
  });

  function renderMenu() {
    const filtered = currentTab === 'all' ? menus : menus.filter(m => m.category === currentTab);
    if (!filtered.length) {
      document.getElementById('menu-list').innerHTML = `<div class="loading-msg">메뉴가 없습니다</div>`;
      return;
    }
    document.getElementById('menu-list').innerHTML = filtered.map(m => {
      const tags = (m.tags || []).map(t => tagMap[t] ? `<span class="tag ${tagMap[t][0]}">${tagMap[t][1]}</span>` : '').join('');
      const qty = cart[m.id]?.qty || 0;
      const imgEl = m.imageUrl
        ? `<div class="menu-img-box"><img src="${m.imageUrl}" alt="${m.name}" onerror="this.parentElement.innerHTML='🍽️'"></div>`
        : `<div class="menu-img-box">🍽️</div>`;
      const btn = m.soldOut
        ? `<button class="sold-out-btn">품절</button>`
        : `<button class="add-btn" onclick="addToCart('${m.id}')">${qty > 0 ? `담기 (${qty})` : '+ 담기'}</button>`;
      return `<div class="menu-card ${m.soldOut ? 'sold-out' : ''}">
        ${imgEl}
        <div class="menu-body">
          <div><div class="menu-tags">${tags}</div>
          <div class="menu-name">${m.name}</div>
          <div class="menu-desc">${m.desc || ''}</div></div>
          <div class="menu-bottom">
            <div class="menu-price">₩${Number(m.price).toLocaleString()}</div>
            ${btn}
          </div>
        </div>
      </div>`;
    }).join('');
  }

  window.addToCart = (id) => {
    const m = menus.find(m => m.id === id);
    if (!m || m.soldOut) return;
    if (!cart[id]) cart[id] = { ...m, qty: 0 };
    cart[id].qty++;
    const total = Object.values(cart).reduce((s,i) => s + i.price * i.qty, 0);
    document.getElementById('cart-total').textContent = '₩' + total.toLocaleString();
    document.getElementById('cart-preview').textContent = Object.values(cart).filter(i=>i.qty>0).map(i=>`${i.name} ${i.qty}개`).join(', ');
    renderMenu();
    showToast(`${m.name} 담겼습니다 🛒`);
  };

  window.switchTab = (tab, el) => {
    currentTab = tab;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    renderMenu();
  };

  window.openOrderModal = () => {
    if (!Object.values(cart).some(i => i.qty > 0)) { showToast('메뉴를 먼저 선택해 주세요'); return; }
    document.getElementById('order-modal').classList.add('show');
  };
  window.closeOrderModal = () => document.getElementById('order-modal').classList.remove('show');

  window.submitOrder = async () => {
    const name = document.getElementById('guest-name-input').value.trim();
    const memo = document.getElementById('guest-memo-input').value.trim();
    const payment = document.querySelector('input[name="payment"]:checked').value;
    if (!name) { showToast('성함을 입력해 주세요'); return; }
    const items = Object.values(cart).filter(i => i.qty > 0).map(i => ({ name:i.name, qty:i.qty, price:i.price, note:i.desc||'' }));
    const total = items.reduce((s,i) => s + i.price * i.qty, 0);
    try {
      await addDoc(collection(db, 'orders'), { room: roomNumber, guestName: name, memo, payment, items, total, status: 'new', createdAt: serverTimestamp() });
      cart = {};
      document.getElementById('cart-total').textContent = '₩0';
      document.getElementById('cart-preview').textContent = '메뉴를 선택해 주세요';
      renderMenu();
      closeOrderModal();
      document.getElementById('guest-name-input').value = '';
      document.getElementById('guest-memo-input').value = '';
      showToast('✅ 주문 접수 완료! 곧 배달해드립니다.');
    } catch(e) { showToast('오류: ' + e.message); }
  };

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }
</script>
</body>
</html>
