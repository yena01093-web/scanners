<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JC Hotel 제천관광호텔 예약관리</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --primary: #c8960c;
    --bg: #0f0e0a;
    --card: #1a1810;
    --border: #2a2618;
    --text: #f0ead0;
    --muted: #887a50;
    --green: #4caf7d;
    --red: #e05555;
    --blue: #4a90d9;
  }

  body { font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  header { background: var(--card); border-bottom: 1px solid var(--border); padding: 14px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
  .logo { font-size: 18px; font-weight: 900; color: var(--primary); }
  .logo span { color: var(--text); font-size: 12px; font-weight: 400; margin-left: 8px; }

  .tabs { display: flex; background: var(--card); border-bottom: 1px solid var(--border); overflow-x: auto; scrollbar-width: none; }
  .tabs::-webkit-scrollbar { display: none; }
  .tab { padding: 12px 16px; font-size: 13px; font-weight: 700; color: var(--muted); border-bottom: 2px solid transparent; cursor: pointer; white-space: nowrap; }
  .tab.active { color: var(--primary); border-bottom-color: var(--primary); }

  .page { display: none; padding: 16px; }
  .page.active { display: block; }

  /* 날짜 선택 */
  .date-bar { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 14px; margin-bottom: 16px; display: flex; gap: 10px; align-items: center; }
  .date-input { flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 10px; color: var(--text); font-size: 13px; }
  .date-arrow { color: var(--muted); font-size: 16px; }
  .search-btn { background: var(--primary); color: #000; border: none; padding: 10px 16px; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; white-space: nowrap; }

  /* 객실 현황 */
  .floor-title { font-size: 13px; font-weight: 700; color: var(--muted); margin: 16px 0 8px; letter-spacing: 1px; }

  .room-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 8px; }

  .room-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 10px 8px; text-align: center; cursor: pointer; transition: all 0.2s; }
  .room-card:active { transform: scale(0.95); }
  .room-card.available { border-color: var(--green); }
  .room-card.booked { border-color: var(--red); background: rgba(224,85,85,0.08); }
  .room-card.checkedin { border-color: var(--blue); background: rgba(74,144,217,0.08); }
  .room-card.cleaning { border-color: var(--primary); background: rgba(200,150,12,0.08); }

  .room-num { font-size: 15px; font-weight: 900; margin-bottom: 3px; }
  .room-type { font-size: 9px; color: var(--muted); margin-bottom: 4px; }
  .room-status { font-size: 9px; font-weight: 700; padding: 2px 6px; border-radius: 4px; }
  .status-available { background: rgba(76,175,125,0.2); color: var(--green); }
  .status-booked { background: rgba(224,85,85,0.2); color: var(--red); }
  .status-checkedin { background: rgba(74,144,217,0.2); color: var(--blue); }
  .status-cleaning { background: rgba(200,150,12,0.2); color: var(--primary); }

  /* 범례 */
  .legend { display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 4px; font-size: 11px; color: var(--muted); }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; }

  /* 예약 목록 */
  .reservation-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 14px; margin-bottom: 8px; }
  .res-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .res-name { font-size: 15px; font-weight: 700; }
  .res-room { font-size: 13px; color: var(--primary); font-weight: 700; }
  .res-detail { font-size: 12px; color: var(--muted); line-height: 1.8; }
  .res-badge { font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 4px; }

  /* 예약 등록 */
  .form-group { margin-bottom: 12px; }
  .form-label { font-size: 12px; color: var(--muted); margin-bottom: 6px; display: block; }
  .form-input { width: 100%; background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 12px; color: var(--text); font-size: 14px; }
  .form-select { width: 100%; background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 12px; color: var(--text); font-size: 14px; }

  .room-type-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
  .room-type-card { background: var(--card); border: 2px solid var(--border); border-radius: 10px; padding: 12px; cursor: pointer; }
  .room-type-card.selected { border-color: var(--primary); background: rgba(200,150,12,0.1); }
  .room-type-name { font-size: 13px; font-weight: 700; margin-bottom: 3px; }
  .room-type-price { font-size: 14px; font-weight: 900; color: var(--primary); }
  .room-type-info { font-size: 11px; color: var(--muted); margin-top: 2px; }

  .submit-btn { width: 100%; background: var(--primary); color: #000; border: none; padding: 14px; border-radius: 10px; font-size: 15px; font-weight: 900; cursor: pointer; }

  /* 통계 */
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 16px; text-align: center; }
  .stat-num { font-size: 28px; font-weight: 900; color: var(--primary); }
  .stat-label { font-size: 11px; color: var(--muted); margin-top: 4px; }

  /* 모달 */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 500; align-items: flex-end; }
  .modal-overlay.visible { display: flex; }
  .modal { background: var(--card); width: 100%; border-radius: 20px 20px 0 0; padding: 24px 20px; border-top: 1px solid var(--border); max-height: 80vh; overflow-y: auto; }
  .modal h3 { font-size: 17px; font-weight: 900; margin-bottom: 16px; }
  .modal-row { display: flex; justify-content: space-between; padding: 8px 0; font-size: 13px; border-bottom: 1px solid var(--border); }
  .modal-total { display: flex; justify-content: space-between; padding: 14px 0; font-size: 16px; font-weight: 900; color: var(--primary); }

  .action-btn { width: 100%; padding: 13px; border-radius: 10px; font-size: 14px; font-weight: 700; cursor: pointer; border: none; margin-bottom: 8px; }
  .btn-primary { background: var(--primary); color: #000; }
  .btn-checkin { background: var(--blue); color: #fff; }
  .btn-checkout { background: var(--green); color: #000; }
  .btn-cancel { background: var(--border); color: var(--text); }
  .btn-delete { background: var(--red); color: #fff; }

  .alert { position: fixed; top: 70px; left: 50%; transform: translateX(-50%); background: var(--green); color: #000; padding: 12px 24px; border-radius: 10px; font-weight: 700; font-size: 14px; z-index: 999; display: none; white-space: nowrap; }
  .alert.error { background: var(--red); color: #fff; }

  .section-title { font-size: 13px; font-weight: 700; color: var(--muted); margin-bottom: 10px; letter-spacing: 1px; }
</style>
</head>
<body>

<header>
  <div class="logo">🏨 JC HOTEL <span>제천관광호텔 예약관리</span></div>
  <div style="font-size:13px;color:var(--muted)" id="headerDate"></div>
</header>

<div class="tabs">
  <div class="tab active" onclick="showPage('rooms', this)">🏠 객실현황</div>
  <div class="tab" onclick="showPage('reservations', this)">📋 예약목록</div>
  <div class="tab" onclick="showPage('newres', this)">➕ 예약등록</div>
  <div class="tab" onclick="showPage('stats', this)">📊 통계</div>
</div>

<!-- 객실 현황 -->
<div class="page active" id="page-rooms">
  <div class="date-bar">
    <input type="date" class="date-input" id="checkDate">
    <button class="search-btn" onclick="renderRooms()">조회</button>
  </div>

  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:var(--green)"></div>빈 객실</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--red)"></div>예약됨</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--blue)"></div>체크인</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--primary)"></div>청소중</div>
  </div>

  <div id="roomsContainer"></div>
</div>

<!-- 예약 목록 -->
<div class="page" id="page-reservations">
  <input style="width:100%;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px;color:var(--text);font-size:14px;margin-bottom:12px;" placeholder="🔍 예약자명 또는 객실번호 검색..." oninput="filterReservations(this.value)">
  <div id="reservationList"></div>
</div>

<!-- 예약 등록 -->
<div class="page" id="page-newres">
  <div class="form-group">
    <label class="form-label">예약자명</label>
    <input class="form-input" id="resName" placeholder="홍길동">
  </div>
  <div class="form-group">
    <label class="form-label">연락처</label>
    <input class="form-input" id="resPhone" placeholder="010-0000-0000" type="tel">
  </div>
  <div class="form-group">
    <label class="form-label">인원</label>
    <select class="form-select" id="resGuests">
      <option value="1">1명</option>
      <option value="2" selected>2명</option>
      <option value="3">3명</option>
      <option value="4">4명</option>
    </select>
  </div>
  <div class="form-group">
    <label class="form-label">체크인</label>
    <input type="date" class="form-input" id="resCheckin">
  </div>
  <div class="form-group">
    <label class="form-label">체크아웃</label>
    <input type="date" class="form-input" id="resCheckout">
  </div>

  <div class="form-group">
    <label class="form-label">객실 타입</label>
    <div class="room-type-grid">
      <div class="room-type-card selected" onclick="selectRoomType(this, '스탠다드', 80000)" id="rt-standard">
        <div class="room-type-name">스탠다드</div>
        <div class="room-type-price">80,000원</div>
        <div class="room-type-info">1박 기준</div>
      </div>
      <div class="room-type-card" onclick="selectRoomType(this, '디럭스', 120000)" id="rt-deluxe">
        <div class="room-type-name">디럭스</div>
        <div class="room-type-price">120,000원</div>
        <div class="room-type-info">1박 기준</div>
      </div>
      <div class="room-type-card" onclick="selectRoomType(this, '스위트', 200000)" id="rt-suite">
        <div class="room-type-name">스위트</div>
        <div class="room-type-price">200,000원</div>
        <div class="room-type-info">1박 기준</div>
      </div>
      <div class="room-type-card" onclick="selectRoomType(this, '패밀리', 180000)" id="rt-family">
        <div class="room-type-name">패밀리</div>
        <div class="room-type-price">180,000원</div>
        <div class="room-type-info">1박 기준</div>
      </div>
    </div>
  </div>

  <button class="submit-btn" onclick="makeReservation()">💳 예약 및 결제</button>
</div>

<!-- 통계 -->
<div class="page" id="page-stats">
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-num" id="statRooms">40</div>
      <div class="stat-label">전체 객실</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" style="color:var(--green)" id="statAvail">0</div>
      <div class="stat-label">오늘 빈 객실</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" style="color:var(--blue)" id="statCheckin">0</div>
      <div class="stat-label">체크인</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" style="color:var(--primary)" id="statRevenue">0</div>
      <div class="stat-label">이번달 매출(만원)</div>
    </div>
  </div>

  <div class="section-title">오늘 체크인 예정</div>
  <div id="todayCheckins"></div>

  <div class="section-title" style="margin-top:16px">오늘 체크아웃 예정</div>
  <div id="todayCheckouts"></div>
</div>

<!-- 객실 상세 모달 -->
<div class="modal-overlay" id="roomModal">
  <div class="modal">
    <h3 id="modalRoomTitle"></h3>
    <div id="modalRoomContent"></div>
    <div id="modalActions"></div>
    <button class="action-btn btn-cancel" onclick="closeModal('roomModal')">닫기</button>
  </div>
</div>

<!-- 예약 상세 모달 -->
<div class="modal-overlay" id="resModal">
  <div class="modal">
    <h3 id="modalResTitle">예약 상세</h3>
    <div id="modalResContent"></div>
    <div id="modalResActions"></div>
    <button class="action-btn btn-cancel" onclick="closeModal('resModal')">닫기</button>
  </div>
</div>

<div class="alert" id="alertMsg"></div>

<script src="https://js.tosspayments.com/v2/standard"></script>

<script>
const today = new Date().toISOString().split('T')[0];
document.getElementById('headerDate').textContent = new Date().toLocaleDateString('ko-KR', { month: 'long', day: 'numeric', weekday: 'short' });
document.getElementById('checkDate').value = today;

// 내일 날짜 설정
const tomorrow = new Date();
tomorrow.setDate(tomorrow.getDate() + 1);
document.getElementById('resCheckin').value = today;
document.getElementById('resCheckout').value = tomorrow.toISOString().split('T')[0];

// 객실 데이터
const roomTypes = { '101': '스탠다드', '102': '스탠다드', '103': '디럭스', '104': '디럭스', '201': '스탠다드', '202': '스탠다드', '203': '디럭스', '204': '스위트', '301': '스탠다드', '302': '스탠다드', '303': '디럭스', '304': '패밀리', '401': '디럭스', '402': '디럭스', '403': '스위트', '404': '스위트' };

let reservations = [
  { id: 'R001', name: '김민수', phone: '010-1234-5678', room: '203', type: '디럭스', checkin: today, checkout: tomorrow.toISOString().split('T')[0], guests: 2, price: 120000, status: 'checkedin' },
  { id: 'R002', name: '이지현', phone: '010-2345-6789', room: '304', type: '패밀리', checkin: today, checkout: tomorrow.toISOString().split('T')[0], guests: 4, price: 180000, status: 'booked' },
  { id: 'R003', name: '박준호', phone: '010-3456-7890', room: '404', type: '스위트', checkin: today, checkout: tomorrow.toISOString().split('T')[0], guests: 2, price: 200000, status: 'booked' },
  { id: 'R004', name: '최영미', phone: '010-4567-8901', room: '104', type: '디럭스', checkin: today, checkout: tomorrow.toISOString().split('T')[0], guests: 2, price: 120000, status: 'checkedin' },
];

let selectedRoomType = { name: '스탠다드', price: 80000 };
let resCounter = reservations.length + 1;

const floors = {
  '1층': ['101', '102', '103', '104', '105', '106', '107', '108', '109', '110'],
  '2층': ['201', '202', '203', '204', '205', '206', '207', '208', '209', '210'],
  '3층': ['301', '302', '303', '304', '305', '306', '307', '308', '309', '310'],
  '4층': ['401', '402', '403', '404', '405', '406', '407', '408', '409', '410'],
};

function getRoomStatus(roomNum, date) {
  const res = reservations.find(r => r.room === roomNum && r.checkin <= date && r.checkout > date);
  if (!res) return 'available';
  return res.status === 'checkedin' ? 'checkedin' : 'booked';
}

function getRoomTypeName(roomNum) {
  const types = { '1': '스탠다드', '2': '스탠다드', '3': '디럭스', '4': '스위트', '0': '패밀리' };
  return types[roomNum.slice(-1)] || '스탠다드';
}

function renderRooms() {
  const date = document.getElementById('checkDate').value;
  const container = document.getElementById('roomsContainer');
  container.innerHTML = '';

  Object.entries(floors).forEach(([floor, rooms]) => {
    const title = document.createElement('div');
    title.className = 'floor-title';
    title.textContent = floor;
    container.appendChild(title);

    const grid = document.createElement('div');
    grid.className = 'room-grid';

    rooms.forEach(roomNum => {
      const status = getRoomStatus(roomNum, date);
      const typeName = getRoomTypeName(roomNum);
      const statusLabels = { available: '빈 객실', booked: '예약됨', checkedin: '체크인', cleaning: '청소중' };

      const card = document.createElement('div');
      card.className = `room-card ${status}`;
      card.innerHTML = `
        <div class="room-num">${roomNum}</div>
        <div class="room-type">${typeName}</div>
        <span class="room-status status-${status}">${statusLabels[status]}</span>
      `;
      card.onclick = () => showRoomDetail(roomNum, status, date);
      grid.appendChild(card);
    });

    container.appendChild(grid);
  });
}

function showRoomDetail(roomNum, status, date) {
  const res = reservations.find(r => r.room === roomNum && r.checkin <= date && r.checkout > date);
  document.getElementById('modalRoomTitle').textContent = `🏠 ${roomNum}호 상세`;

  let content = `<div class="modal-row"><span>객실</span><span>${roomNum}호</span></div>
    <div class="modal-row"><span>타입</span><span>${getRoomTypeName(roomNum)}</span></div>
    <div class="modal-row"><span>상태</span><span>${status === 'available' ? '빈 객실' : status === 'booked' ? '예약됨' : '체크인 중'}</span></div>`;

  if (res) {
    content += `<div class="modal-row"><span>예약자</span><span>${res.name}</span></div>
      <div class="modal-row"><span>연락처</span><span>${res.phone}</span></div>
      <div class="modal-row"><span>체크인</span><span>${res.checkin}</span></div>
      <div class="modal-row"><span>체크아웃</span><span>${res.checkout}</span></div>
      <div class="modal-row"><span>인원</span><span>${res.guests}명</span></div>
      <div class="modal-total"><span>결제금액</span><span>${res.price.toLocaleString()}원</span></div>`;
  }

  document.getElementById('modalRoomContent').innerHTML = content;

  let actions = '';
  if (res) {
    if (res.status === 'booked') {
      actions = `<button class="action-btn btn-checkin" onclick="doCheckin('${res.id}')">✅ 체크인 처리</button>`;
    } else if (res.status === 'checkedin') {
      actions = `<button class="action-btn btn-checkout" onclick="doCheckout('${res.id}')">🚪 체크아웃 처리</button>`;
    }
  }
  document.getElementById('modalActions').innerHTML = actions;
  document.getElementById('roomModal').classList.add('visible');
}

function doCheckin(resId) {
  const res = reservations.find(r => r.id === resId);
  if (res) { res.status = 'checkedin'; renderRooms(); showAlert(`${res.name}님 체크인 완료! ✅`); }
  closeModal('roomModal');
}

function doCheckout(resId) {
  const res = reservations.find(r => r.id === resId);
  if (res) { res.status = 'checkedout'; renderRooms(); showAlert(`${res.name}님 체크아웃 완료! 🚪`); }
  closeModal('roomModal');
}

function renderReservations(list) {
  const statusLabel = { booked: '예약확정', checkedin: '체크인', checkedout: '체크아웃', cancelled: '취소' };
  const statusColor = { booked: 'status-booked', checkedin: 'status-checkedin', checkedout: 'status-available', cancelled: 'status-expired' };
  document.getElementById('reservationList').innerHTML = (list || reservations).map(r => `
    <div class="reservation-card" onclick="showResDetail('${r.id}')">
      <div class="res-header">
        <div class="res-name">${r.name}</div>
        <span class="res-badge ${statusColor[r.status] || 'status-available'}">${statusLabel[r.status] || r.status}</span>
      </div>
      <div class="res-room">🏠 ${r.room}호 · ${r.type}</div>
      <div class="res-detail">${r.checkin} ~ ${r.checkout} · ${r.guests}명 · ${r.price.toLocaleString()}원</div>
    </div>
  `).join('');
}

function filterReservations(query) {
  const filtered = reservations.filter(r => r.name.includes(query) || r.room.includes(query) || r.phone.includes(query));
  renderReservations(filtered);
}

function showResDetail(resId) {
  const res = reservations.find(r => r.id === resId);
  if (!res) return;
  document.getElementById('modalResTitle').textContent = `📋 예약 상세 (${res.id})`;
  document.getElementById('modalResContent').innerHTML = `
    <div class="modal-row"><span>예약자</span><span>${res.name}</span></div>
    <div class="modal-row"><span>연락처</span><span>${res.phone}</span></div>
    <div class="modal-row"><span>객실</span><span>${res.room}호 (${res.type})</span></div>
    <div class="modal-row"><span>체크인</span><span>${res.checkin}</span></div>
    <div class="modal-row"><span>체크아웃</span><span>${res.checkout}</span></div>
    <div class="modal-row"><span>인원</span><span>${res.guests}명</span></div>
    <div class="modal-total"><span>결제금액</span><span>${res.price.toLocaleString()}원</span></div>
  `;
  let actions = '';
  if (res.status === 'booked') actions = `<button class="action-btn btn-checkin" onclick="doCheckin('${res.id}');closeModal('resModal')">✅ 체크인</button>`;
  else if (res.status === 'checkedin') actions = `<button class="action-btn btn-checkout" onclick="doCheckout('${res.id}');closeModal('resModal')">🚪 체크아웃</button>`;
  document.getElementById('modalResActions').innerHTML = actions;
  document.getElementById('resModal').classList.add('visible');
}

function selectRoomType(el, name, price) {
  document.querySelectorAll('.room-type-card').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  selectedRoomType = { name, price };
}

function makeReservation() {
  const name = document.getElementById('resName').value.trim();
  const phone = document.getElementById('resPhone').value.trim();
  const checkin = document.getElementById('resCheckin').value;
  const checkout = document.getElementById('resCheckout').value;
  const guests = document.getElementById('resGuests').value;

  if (!name) { showAlert('예약자명을 입력해주세요', true); return; }
  if (!phone) { showAlert('연락처를 입력해주세요', true); return; }
  if (!checkin || !checkout) { showAlert('날짜를 선택해주세요', true); return; }
  if (checkin >= checkout) { showAlert('체크아웃은 체크인 이후여야 합니다', true); return; }

  const nights = Math.ceil((new Date(checkout) - new Date(checkin)) / (1000 * 60 * 60 * 24));
  const total = selectedRoomType.price * nights;

  // 빈 객실 찾기
  const allRooms = Object.values(floors).flat();
  const availRoom = allRooms.find(room => {
    return !reservations.some(r => r.room === room && r.checkin < checkout && r.checkout > checkin && r.status !== 'checkedout' && r.status !== 'cancelled');
  });

  if (!availRoom) { showAlert('해당 기간에 빈 객실이 없습니다', true); return; }

  const newRes = {
    id: 'R' + String(resCounter).padStart(3, '0'),
    name, phone,
    room: availRoom,
    type: selectedRoomType.name,
    checkin, checkout,
    guests: parseInt(guests),
    price: total,
    status: 'booked'
  };
  resCounter++;
  reservations.unshift(newRes);

  document.getElementById('resName').value = '';
  document.getElementById('resPhone').value = '';

  showAlert(`${name}님 ${availRoom}호 예약 완료! 🎉`);
  renderRooms();
}

function renderStats() {
  const todayStr = new Date().toISOString().split('T')[0];
  const available = Object.values(floors).flat().filter(r => getRoomStatus(r, todayStr) === 'available').length;
  const checkins = reservations.filter(r => r.checkin === todayStr).length;
  const revenue = reservations.filter(r => {
    const d = new Date(r.checkin);
    return d.getMonth() === new Date().getMonth() && r.status !== 'cancelled';
  }).reduce((s, r) => s + r.price, 0);

  document.getElementById('statAvail').textContent = available;
  document.getElementById('statCheckin').textContent = checkins;
  document.getElementById('statRevenue').textContent = Math.floor(revenue / 10000);

  const todayIn = reservations.filter(r => r.checkin === todayStr && r.status === 'booked');
  const todayOut = reservations.filter(r => r.checkout === todayStr && r.status === 'checkedin');

  document.getElementById('todayCheckins').innerHTML = todayIn.length === 0
    ? '<p style="color:var(--muted);font-size:13px;padding:12px 0">없음</p>'
    : todayIn.map(r => `<div class="reservation-card"><div class="res-header"><div class="res-name">${r.name}</div><span class="res-badge status-booked">체크인 예정</span></div><div class="res-room">🏠 ${r.room}호</div><div class="res-detail">${r.phone} · ${r.guests}명</div></div>`).join('');

  document.getElementById('todayCheckouts').innerHTML = todayOut.length === 0
    ? '<p style="color:var(--muted);font-size:13px;padding:12px 0">없음</p>'
    : todayOut.map(r => `<div class="reservation-card"><div class="res-header"><div class="res-name">${r.name}</div><span class="res-badge status-checkedin">체크아웃 예정</span></div><div class="res-room">🏠 ${r.room}호</div><div class="res-detail">${r.phone} · ${r.guests}명</div></div>`).join('');
}

function showPage(id, el) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('page-' + id).classList.add('active');
  el.classList.add('active');
  if (id === 'reservations') renderReservations();
  if (id === 'stats') renderStats();
}

function closeModal(id) { document.getElementById(id).classList.remove('visible'); }

function showAlert(msg, isError = false) {
  const el = document.getElementById('alertMsg');
  el.textContent = msg;
  el.className = 'alert' + (isError ? ' error' : '');
  el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 2500);
}

// 초기 렌더링
renderRooms();
</script>
</body>
</html>
