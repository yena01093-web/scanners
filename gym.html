<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GYM 회원관리 시스템</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --primary: #00d4ff;
    --bg: #0a0a0f;
    --card: #12121a;
    --border: #1e1e2e;
    --text: #e0e0ff;
    --muted: #666688;
    --green: #00ff88;
    --red: #ff4466;
    --gold: #ffd700;
  }

  body {
    font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* 헤더 */
  header {
    background: var(--card);
    border-bottom: 1px solid var(--border);
    padding: 14px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo { font-size: 18px; font-weight: 900; color: var(--primary); letter-spacing: -0.5px; }
  .logo span { color: var(--text); }

  .header-time { font-size: 13px; color: var(--muted); }

  /* 탭 */
  .tabs {
    display: flex;
    background: var(--card);
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }

  .tab {
    padding: 12px 18px;
    font-size: 13px;
    font-weight: 700;
    color: var(--muted);
    border-bottom: 2px solid transparent;
    cursor: pointer;
    white-space: nowrap;
  }
  .tab.active { color: var(--primary); border-bottom-color: var(--primary); }

  /* 페이지 */
  .page { display: none; padding: 16px; }
  .page.active { display: block; }

  /* 출입 체크 */
  .checkin-box {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    text-align: center;
    margin-bottom: 16px;
  }

  .camera-view {
    background: #000;
    border-radius: 12px;
    height: 200px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 16px;
    position: relative;
    overflow: hidden;
    border: 2px solid var(--border);
  }

  .camera-icon { font-size: 48px; color: var(--muted); }

  .scan-line {
    position: absolute;
    width: 100%;
    height: 2px;
    background: var(--primary);
    top: 0;
    animation: scan 2s linear infinite;
    box-shadow: 0 0 8px var(--primary);
  }

  @keyframes scan {
    0% { top: 0; }
    100% { top: 100%; }
  }

  .checkin-input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    color: var(--text);
    font-size: 15px;
    margin-bottom: 10px;
    text-align: center;
  }

  .checkin-btn {
    width: 100%;
    background: var(--primary);
    color: #000;
    border: none;
    padding: 14px;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 900;
    cursor: pointer;
  }

  /* 최근 출입 */
  .section-title {
    font-size: 14px;
    font-weight: 700;
    color: var(--muted);
    margin-bottom: 10px;
    letter-spacing: 1px;
  }

  .checkin-item {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 8px;
  }

  .member-avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    font-weight: 900;
    flex-shrink: 0;
  }

  .checkin-info { flex: 1; }
  .checkin-name { font-size: 14px; font-weight: 700; margin-bottom: 2px; }
  .checkin-detail { font-size: 12px; color: var(--muted); }
  .checkin-time { font-size: 12px; color: var(--primary); font-weight: 700; }

  .status-badge {
    font-size: 10px;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 4px;
  }
  .status-in { background: rgba(0,255,136,0.15); color: var(--green); }
  .status-out { background: rgba(255,68,102,0.15); color: var(--red); }
  .status-active { background: rgba(0,212,255,0.15); color: var(--primary); }
  .status-expired { background: rgba(255,68,102,0.15); color: var(--red); }

  /* 통계 카드 */
  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 16px;
  }

  .stat-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    text-align: center;
  }

  .stat-num { font-size: 28px; font-weight: 900; color: var(--primary); }
  .stat-label { font-size: 11px; color: var(--muted); margin-top: 4px; }

  /* 회원 목록 */
  .search-input {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    color: var(--text);
    font-size: 14px;
    margin-bottom: 12px;
  }

  .member-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .member-card-info { flex: 1; }
  .member-card-name { font-size: 15px; font-weight: 700; margin-bottom: 3px; }
  .member-card-detail { font-size: 12px; color: var(--muted); }

  /* 회원 등록 */
  .form-group { margin-bottom: 12px; }
  .form-label { font-size: 12px; color: var(--muted); margin-bottom: 6px; display: block; }

  .form-input {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    color: var(--text);
    font-size: 14px;
  }

  .form-select {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    color: var(--text);
    font-size: 14px;
  }

  .ticket-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 12px;
  }

  .ticket-option {
    background: var(--card);
    border: 2px solid var(--border);
    border-radius: 10px;
    padding: 12px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
  }

  .ticket-option.selected {
    border-color: var(--primary);
    background: rgba(0,212,255,0.1);
  }

  .ticket-name { font-size: 13px; font-weight: 700; margin-bottom: 4px; }
  .ticket-price { font-size: 15px; font-weight: 900; color: var(--gold); }
  .ticket-period { font-size: 11px; color: var(--muted); }

  .submit-btn {
    width: 100%;
    background: var(--primary);
    color: #000;
    border: none;
    padding: 14px;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 900;
    cursor: pointer;
    margin-top: 8px;
  }

  /* 알림 */
  .alert {
    position: fixed;
    top: 70px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--green);
    color: #000;
    padding: 12px 24px;
    border-radius: 10px;
    font-weight: 700;
    font-size: 14px;
    z-index: 999;
    display: none;
    white-space: nowrap;
  }

  .alert.error { background: var(--red); color: #fff; }

  /* 결제 모달 */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 500;
    align-items: flex-end;
  }
  .modal-overlay.visible { display: flex; }
  .modal {
    background: var(--card);
    width: 100%;
    border-radius: 20px 20px 0 0;
    padding: 24px 20px;
    border-top: 1px solid var(--border);
  }

  .modal h3 { font-size: 17px; font-weight: 900; margin-bottom: 16px; }

  .payment-item {
    display: flex;
    justify-content: space-between;
    padding: 8px 0;
    font-size: 13px;
    border-bottom: 1px solid var(--border);
  }

  .payment-total {
    display: flex;
    justify-content: space-between;
    padding: 14px 0;
    font-size: 16px;
    font-weight: 900;
    color: var(--primary);
  }

  .pay-btn {
    width: 100%;
    background: var(--primary);
    color: #000;
    border: none;
    padding: 14px;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 900;
    cursor: pointer;
    margin-bottom: 8px;
  }

  .cancel-btn {
    width: 100%;
    background: var(--border);
    color: var(--text);
    border: none;
    padding: 12px;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
  }
</style>
</head>
<body>

<header>
  <div class="logo">GYM<span>PRO</span></div>
  <div class="header-time" id="headerTime"></div>
</header>

<div class="tabs">
  <div class="tab active" onclick="showPage('checkin', this)">🏃 출입체크</div>
  <div class="tab" onclick="showPage('members', this)">👥 회원목록</div>
  <div class="tab" onclick="showPage('register', this)">➕ 회원등록</div>
  <div class="tab" onclick="showPage('stats', this)">📊 현황</div>
</div>

<!-- 출입체크 -->
<div class="page active" id="page-checkin">
  <div class="checkin-box">
    <div class="camera-view">
      <div class="scan-line"></div>
      <div class="camera-icon">📷</div>
    </div>
    <p style="font-size:12px;color:#666688;margin-bottom:12px;">얼굴 인식 또는 회원번호 입력</p>
    <input class="checkin-input" id="checkinInput" type="text" placeholder="회원번호 입력 (예: M001)">
    <button class="checkin-btn" onclick="doCheckin()">✅ 출입 확인</button>
  </div>

  <div class="section-title">오늘 출입 현황</div>
  <div id="checkinList"></div>
</div>

<!-- 회원목록 -->
<div class="page" id="page-members">
  <input class="search-input" placeholder="🔍 회원 검색..." oninput="filterMembers(this.value)">
  <div id="memberList"></div>
</div>

<!-- 회원등록 -->
<div class="page" id="page-register">
  <div class="form-group">
    <label class="form-label">이름</label>
    <input class="form-input" id="regName" placeholder="홍길동">
  </div>
  <div class="form-group">
    <label class="form-label">연락처</label>
    <input class="form-input" id="regPhone" placeholder="010-0000-0000" type="tel">
  </div>
  <div class="form-group">
    <label class="form-label">성별</label>
    <select class="form-select" id="regGender">
      <option value="남">남성</option>
      <option value="여">여성</option>
    </select>
  </div>

  <div class="form-group">
    <label class="form-label">이용권 선택</label>
    <div class="ticket-grid">
      <div class="ticket-option selected" onclick="selectTicket(this, '1개월', 50000, 30)" id="ticket-1">
        <div class="ticket-name">1개월권</div>
        <div class="ticket-price">50,000원</div>
        <div class="ticket-period">30일</div>
      </div>
      <div class="ticket-option" onclick="selectTicket(this, '3개월', 130000, 90)" id="ticket-2">
        <div class="ticket-name">3개월권</div>
        <div class="ticket-price">130,000원</div>
        <div class="ticket-period">90일</div>
      </div>
      <div class="ticket-option" onclick="selectTicket(this, '6개월', 230000, 180)" id="ticket-3">
        <div class="ticket-name">6개월권</div>
        <div class="ticket-price">230,000원</div>
        <div class="ticket-period">180일</div>
      </div>
      <div class="ticket-option" onclick="selectTicket(this, '1년', 400000, 365)" id="ticket-4">
        <div class="ticket-name">1년권</div>
        <div class="ticket-price">400,000원</div>
        <div class="ticket-period">365일</div>
      </div>
    </div>
  </div>

  <button class="submit-btn" onclick="registerMember()">💳 결제 및 등록</button>
</div>

<!-- 현황 -->
<div class="page" id="page-stats">
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-num" id="statTotal">0</div>
      <div class="stat-label">전체 회원</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" style="color:var(--green)" id="statActive">0</div>
      <div class="stat-label">이용중</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" style="color:var(--primary)" id="statToday">0</div>
      <div class="stat-label">오늘 방문</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" style="color:var(--red)" id="statExpired">0</div>
      <div class="stat-label">만료 임박</div>
    </div>
  </div>

  <div class="section-title">만료 임박 회원 (7일 이내)</div>
  <div id="expiringList"></div>
</div>

<!-- 결제 모달 -->
<div class="modal-overlay" id="payModal">
  <div class="modal">
    <h3>💳 결제 확인</h3>
    <div id="paymentDetail"></div>
    <button class="pay-btn" onclick="processPayment()">토스페이먼츠로 결제</button>
    <button class="cancel-btn" onclick="closePayModal()">취소</button>
  </div>
</div>

<div class="alert" id="alertMsg"></div>

<script src="https://js.tosspayments.com/v2/standard"></script>

<script>
// 샘플 데이터
let members = [
  { id: 'M001', name: '김철수', phone: '010-1234-5678', gender: '남', ticket: '3개월권', startDate: '2026-04-01', endDate: '2026-06-30', avatar: '💪', color: '#00d4ff' },
  { id: 'M002', name: '이영희', phone: '010-2345-6789', gender: '여', ticket: '1개월권', startDate: '2026-05-01', endDate: '2026-05-31', avatar: '🏋️', color: '#ff4466' },
  { id: 'M003', name: '박민준', phone: '010-3456-7890', gender: '남', ticket: '6개월권', startDate: '2026-03-01', endDate: '2026-08-31', avatar: '🔥', color: '#00ff88' },
  { id: 'M004', name: '최수진', phone: '010-4567-8901', gender: '여', ticket: '1년권', startDate: '2026-01-01', endDate: '2026-12-31', avatar: '⚡', color: '#ffd700' },
  { id: 'M005', name: '정태호', phone: '010-5678-9012', gender: '남', ticket: '1개월권', startDate: '2026-05-05', endDate: '2026-06-04', avatar: '🏃', color: '#ff8800' },
];

let checkins = [
  { memberId: 'M001', name: '김철수', time: '09:23', type: 'in', avatar: '💪', color: '#00d4ff' },
  { memberId: 'M003', name: '박민준', time: '09:45', type: 'in', avatar: '🔥', color: '#00ff88' },
  { memberId: 'M002', name: '이영희', time: '10:12', type: 'out', avatar: '🏋️', color: '#ff4466' },
];

let selectedTicket = { name: '1개월', price: 50000, days: 30 };
let pendingMember = null;
let memberCounter = members.length + 1;

// 시간 업데이트
function updateTime() {
  const now = new Date();
  document.getElementById('headerTime').textContent = now.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
}
setInterval(updateTime, 1000);
updateTime();

function showPage(id, el) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('page-' + id).classList.add('active');
  el.classList.add('active');
  if (id === 'members') renderMembers(members);
  if (id === 'stats') renderStats();
  if (id === 'checkin') renderCheckins();
}

function renderCheckins() {
  const list = document.getElementById('checkinList');
  list.innerHTML = checkins.map(c => `
    <div class="checkin-item">
      <div class="member-avatar" style="background:${c.color}22;color:${c.color}">${c.avatar}</div>
      <div class="checkin-info">
        <div class="checkin-name">${c.name}</div>
        <div class="checkin-detail">${c.memberId}</div>
      </div>
      <div style="text-align:right">
        <div class="checkin-time">${c.time}</div>
        <span class="status-badge ${c.type === 'in' ? 'status-in' : 'status-out'}">${c.type === 'in' ? '입장' : '퇴장'}</span>
      </div>
    </div>
  `).join('');
}

function doCheckin() {
  const input = document.getElementById('checkinInput').value.trim().toUpperCase();
  if (!input) { showAlert('회원번호를 입력해주세요', true); return; }

  const member = members.find(m => m.id === input);
  if (!member) { showAlert('등록되지 않은 회원입니다', true); return; }

  const now = new Date();
  const timeStr = now.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
  const lastCheckin = checkins.find(c => c.memberId === input);
  const type = lastCheckin && lastCheckin.type === 'in' ? 'out' : 'in';

  checkins.unshift({ memberId: input, name: member.name, time: timeStr, type, avatar: member.avatar, color: member.color });
  renderCheckins();
  document.getElementById('checkinInput').value = '';
  showAlert(`${member.name}님 ${type === 'in' ? '입장' : '퇴장'} 완료! ✅`);
}

function renderMembers(list) {
  const today = new Date();
  document.getElementById('memberList').innerHTML = list.map(m => {
    const end = new Date(m.endDate);
    const daysLeft = Math.ceil((end - today) / (1000 * 60 * 60 * 24));
    const isActive = daysLeft > 0;
    return `
      <div class="member-card">
        <div class="member-avatar" style="background:${m.color}22;color:${m.color}">${m.avatar}</div>
        <div class="member-card-info">
          <div class="member-card-name">${m.name} <span style="font-size:11px;color:#666688">${m.id}</span></div>
          <div class="member-card-detail">${m.ticket} · ${m.endDate}까지 · ${isActive ? daysLeft + '일 남음' : '만료'}</div>
        </div>
        <span class="status-badge ${isActive ? 'status-active' : 'status-expired'}">${isActive ? '이용중' : '만료'}</span>
      </div>
    `;
  }).join('');
}

function filterMembers(query) {
  const filtered = members.filter(m => m.name.includes(query) || m.id.includes(query) || m.phone.includes(query));
  renderMembers(filtered);
}

function selectTicket(el, name, price, days) {
  document.querySelectorAll('.ticket-option').forEach(t => t.classList.remove('selected'));
  el.classList.add('selected');
  selectedTicket = { name, price, days };
}

function registerMember() {
  const name = document.getElementById('regName').value.trim();
  const phone = document.getElementById('regPhone').value.trim();
  const gender = document.getElementById('regGender').value;

  if (!name) { showAlert('이름을 입력해주세요', true); return; }
  if (!phone) { showAlert('연락처를 입력해주세요', true); return; }

  pendingMember = { name, phone, gender, ticket: selectedTicket };

  document.getElementById('paymentDetail').innerHTML = `
    <div class="payment-item"><span>회원명</span><span>${name}</span></div>
    <div class="payment-item"><span>이용권</span><span>${selectedTicket.name}권 (${selectedTicket.days}일)</span></div>
    <div class="payment-item"><span>연락처</span><span>${phone}</span></div>
    <div class="payment-total"><span>결제금액</span><span>${selectedTicket.price.toLocaleString()}원</span></div>
  `;

  document.getElementById('payModal').classList.add('visible');
}

async function processPayment() {
  closePayModal();
  if (!pendingMember) return;

  const today = new Date();
  const endDate = new Date(today);
  endDate.setDate(endDate.getDate() + pendingMember.ticket.days);

  const avatars = ['💪', '🏋️', '🔥', '⚡', '🏃', '🎯', '🦾'];
  const colors = ['#00d4ff', '#ff4466', '#00ff88', '#ffd700', '#ff8800', '#aa44ff'];
  const newId = 'M' + String(memberCounter).padStart(3, '0');
  memberCounter++;

  const newMember = {
    id: newId,
    name: pendingMember.name,
    phone: pendingMember.phone,
    gender: pendingMember.gender,
    ticket: pendingMember.ticket.name + '권',
    startDate: today.toISOString().split('T')[0],
    endDate: endDate.toISOString().split('T')[0],
    avatar: avatars[Math.floor(Math.random() * avatars.length)],
    color: colors[Math.floor(Math.random() * colors.length)]
  };

  members.unshift(newMember);

  // 폼 초기화
  document.getElementById('regName').value = '';
  document.getElementById('regPhone').value = '';

  showAlert(`${pendingMember.name}님 등록 완료! 🎉`);
  pendingMember = null;
}

function closePayModal() {
  document.getElementById('payModal').classList.remove('visible');
}

function renderStats() {
  const today = new Date();
  const total = members.length;
  const active = members.filter(m => new Date(m.endDate) > today).length;
  const todayVisits = checkins.length;
  const expiring = members.filter(m => {
    const days = Math.ceil((new Date(m.endDate) - today) / (1000 * 60 * 60 * 24));
    return days > 0 && days <= 7;
  });

  document.getElementById('statTotal').textContent = total;
  document.getElementById('statActive').textContent = active;
  document.getElementById('statToday').textContent = todayVisits;
  document.getElementById('statExpired').textContent = expiring.length;

  document.getElementById('expiringList').innerHTML = expiring.length === 0
    ? '<p style="color:#666688;font-size:13px;text-align:center;padding:20px">만료 임박 회원 없음</p>'
    : expiring.map(m => {
        const days = Math.ceil((new Date(m.endDate) - today) / (1000 * 60 * 60 * 24));
        return `
          <div class="checkin-item">
            <div class="member-avatar" style="background:${m.color}22;color:${m.color}">${m.avatar}</div>
            <div class="checkin-info">
              <div class="checkin-name">${m.name}</div>
              <div class="checkin-detail">${m.ticket} · ${m.endDate}까지</div>
            </div>
            <span class="status-badge" style="background:rgba(255,215,0,0.15);color:#ffd700">${days}일 남음</span>
          </div>
        `;
      }).join('');
}

function showAlert(msg, isError = false) {
  const el = document.getElementById('alertMsg');
  el.textContent = msg;
  el.className = 'alert' + (isError ? ' error' : '');
  el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 2500);
}

// 초기 렌더링
renderCheckins();
</script>
</body>
</html>
