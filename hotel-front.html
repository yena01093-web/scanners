<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JC Hotel 프론트 주문 알림</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif; background: #0f0e0a; color: #f0ead0; min-height: 100vh; }

  header { background: #1a1810; border-bottom: 1px solid #2a2618; padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; }
  .logo { font-size: 18px; font-weight: 900; color: #c8960c; }
  .status { font-size: 12px; color: #887a50; }
  .status.online { color: #4caf7d; }

  .stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; padding: 16px; }
  .stat { background: #1a1810; border: 1px solid #2a2618; border-radius: 10px; padding: 14px; text-align: center; }
  .stat-num { font-size: 24px; font-weight: 900; color: #c8960c; }
  .stat-label { font-size: 11px; color: #887a50; margin-top: 4px; }

  .orders-section { padding: 0 16px 16px; }
  .section-title { font-size: 13px; font-weight: 700; color: #887a50; letter-spacing: 1px; margin-bottom: 10px; }

  .order-card { background: #1a1810; border: 1px solid #2a2618; border-radius: 12px; padding: 16px; margin-bottom: 10px; position: relative; overflow: hidden; }
  .order-card.new { border-color: #c8960c; animation: pulse 1s ease-in-out 3; }
  .order-card.done { opacity: 0.5; }

  @keyframes pulse {
    0%, 100% { border-color: #c8960c; }
    50% { border-color: #fff; box-shadow: 0 0 12px rgba(200,150,12,0.5); }
  }

  .order-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .order-room { font-size: 18px; font-weight: 900; color: #c8960c; }
  .order-time { font-size: 12px; color: #887a50; }
  .order-new-badge { background: #c8960c; color: #000; font-size: 10px; font-weight: 900; padding: 3px 8px; border-radius: 4px; animation: blink 0.8s infinite; }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .order-items { font-size: 13px; color: #f0ead0; line-height: 1.8; margin-bottom: 10px; }
  .order-total { font-size: 15px; font-weight: 900; color: #c8960c; margin-bottom: 10px; }
  .order-req { font-size: 12px; color: #887a50; background: #0f0e0a; border-radius: 6px; padding: 8px; margin-bottom: 10px; }

  .order-actions { display: flex; gap: 8px; }
  .btn-done { flex: 1; background: #4caf7d; color: #000; border: none; padding: 10px; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; }
  .btn-cancel { background: #2a2618; color: #f0ead0; border: none; padding: 10px 16px; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; }

  .empty { text-align: center; padding: 40px; color: #887a50; font-size: 14px; }

  .sound-btn { position: fixed; bottom: 20px; right: 20px; background: #c8960c; color: #000; border: none; width: 56px; height: 56px; border-radius: 50%; font-size: 22px; cursor: pointer; box-shadow: 0 4px 12px rgba(200,150,12,0.4); }
</style>
</head>
<body>

<header>
  <div class="logo">🏨 JC Hotel 프론트</div>
  <div class="status online" id="statusText">● 실시간 연결중</div>
</header>

<div class="stats">
  <div class="stat">
    <div class="stat-num" id="statNew">0</div>
    <div class="stat-label">신규 주문</div>
  </div>
  <div class="stat">
    <div class="stat-num" id="statToday">0</div>
    <div class="stat-label">오늘 주문</div>
  </div>
  <div class="stat">
    <div class="stat-num" id="statRevenue">0</div>
    <div class="stat-label">오늘 매출(원)</div>
  </div>
</div>

<div class="orders-section">
  <div class="section-title">주문 현황</div>
  <div id="ordersList"></div>
</div>

<button class="sound-btn" onclick="testSound()" title="소리 테스트">🔔</button>

<!-- Firebase -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, collection, onSnapshot, doc, updateDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBHX6xer7Yy_kLFDPiuWrJO2l_PTQ6M0Ts",
    authDomain: "supercrispy-staff.firebaseapp.com",
    projectId: "supercrispy-staff",
    storageBucket: "supercrispy-staff.firebasestorage.app",
    messagingSenderId: "1015813214645",
    appId: "1:1015813214645:web:9bca5550b065a2c1c0c9fc"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  let orders = [];
  let isFirst = true;

  // 실시간 주문 수신
  const q = query(collection(db, "hotel_orders"), orderBy("createdAt", "desc"));

  onSnapshot(q, (snapshot) => {
    const newOrders = [];
    snapshot.forEach(doc => {
      newOrders.push({ id: doc.id, ...doc.data() });
    });

    // 새 주문 감지
    if (!isFirst && newOrders.length > orders.length) {
      playAlarm();
      showNotification();
    }

    orders = newOrders;
    isFirst = false;
    renderOrders();
  });

  window.completeOrder = async function(orderId) {
    await updateDoc(doc(db, "hotel_orders", orderId), { status: "done" });
  };
</script>

<script>
  // 배민 스타일 알림음 생성
  function playAlarm() {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();

      const notes = [523, 659, 784, 1047]; // C5, E5, G5, C6
      notes.forEach((freq, i) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.frequency.value = freq;
        osc.type = 'sine';
        gain.gain.setValueAtTime(0.3, ctx.currentTime + i * 0.15);
        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + i * 0.15 + 0.3);
        osc.start(ctx.currentTime + i * 0.15);
        osc.stop(ctx.currentTime + i * 0.15 + 0.3);
      });

      // "주문이 들어왔습니다" 음성 안내
      if ('speechSynthesis' in window) {
        setTimeout(() => {
          const msg = new SpeechSynthesisUtterance('주문이 들어왔습니다');
          msg.lang = 'ko-KR';
          msg.rate = 0.9;
          msg.volume = 1;
          window.speechSynthesis.speak(msg);
        }, 700);
      }
    } catch (e) {
      console.log('소리 오류:', e);
    }
  }

  function testSound() {
    playAlarm();
  }

  function showNotification() {
    if ('Notification' in window && Notification.permission === 'granted') {
      new Notification('🛎️ 새 룸서비스 주문!', {
        body: '새로운 주문이 들어왔습니다.',
        icon: '🏨'
      });
    }
  }

  // 알림 권한 요청
  if ('Notification' in window) {
    Notification.requestPermission();
  }

  function renderOrders() {
    const list = document.getElementById('ordersList');
    const newOrders = orders.filter(o => o.status === 'new');
    const doneOrders = orders.filter(o => o.status === 'done');
    const todayRevenue = orders.filter(o => o.status === 'done').reduce((s, o) => s + (o.total || 0), 0);

    document.getElementById('statNew').textContent = newOrders.length;
    document.getElementById('statToday').textContent = orders.length;
    document.getElementById('statRevenue').textContent = todayRevenue.toLocaleString();

    if (orders.length === 0) {
      list.innerHTML = '<div class="empty">🛎️ 아직 주문이 없습니다</div>';
      return;
    }

    list.innerHTML = orders.map(order => `
      <div class="order-card ${order.status === 'new' ? 'new' : 'done'}">
        <div class="order-header">
          <div class="order-room">🏠 ${order.room}호</div>
          <div style="display:flex;align-items:center;gap:8px">
            ${order.status === 'new' ? '<span class="order-new-badge">NEW</span>' : '<span style="font-size:11px;color:#4caf7d">✅ 완료</span>'}
            <div class="order-time">${order.orderTime || ''}</div>
          </div>
        </div>
        <div class="order-items">${(order.items || []).map(i => `${i.name} x${i.qty}`).join('<br>')}</div>
        <div class="order-total">합계: ${(order.total || 0).toLocaleString()}원</div>
        ${order.request ? `<div class="order-req">📝 ${order.request}</div>` : ''}
        ${order.status === 'new' ? `
          <div class="order-actions">
            <button class="btn-done" onclick="completeOrder('${order.id}')">✅ 처리 완료</button>
            <button class="btn-cancel">취소</button>
          </div>
        ` : ''}
      </div>
    `).join('');
  }
</script>
</body>
</html>
