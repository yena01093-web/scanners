<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0d1117">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="재고스캐너">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icon-192.png">
<title>재고관리 스캐너</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d1117;--surface:#161b22;--surface2:#21262d;--border:#30363d;--accent:#58a6ff;--green:#3fb950;--orange:#d29922;--red:#f85149;--text:#e6edf3;--text2:#7d8590;--mono:'IBM Plex Mono',monospace;--sans:'Noto Sans KR',sans-serif}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;display:flex;justify-content:center;overscroll-behavior:none}
.wrap{width:100%;max-width:430px;min-height:100vh;display:flex;flex-direction:column}
.hdr{display:flex;align-items:center;gap:10px;padding:14px 16px 12px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.hdr-title{flex:1;font-family:var(--mono);font-size:15px;font-weight:700}
.hdr-badge{font-family:var(--mono);font-size:10px;font-weight:700;padding:3px 8px;border-radius:4px;border:1px solid}
.hdr-badge.live{color:var(--green);border-color:var(--green);background:rgba(63,185,80,.1)}
.hdr-badge.ready{color:var(--text2);border-color:var(--border)}
.install-banner{display:none;align-items:center;gap:10px;padding:10px 16px;background:rgba(88,166,255,.08);border-bottom:1px solid rgba(88,166,255,.2)}
.install-banner.show{display:flex}
.install-banner p{flex:1;font-size:12px;color:var(--accent)}
.btn-install{background:var(--accent);border:none;border-radius:6px;color:#0d1117;font-size:12px;font-weight:700;padding:6px 14px;cursor:pointer;font-family:var(--sans)}
.cam-wrap{position:relative;background:#000;height:220px;overflow:hidden;cursor:pointer;flex-shrink:0}
.cam-wrap video{width:100%;height:100%;object-fit:cover;display:block}
.cam-placeholder{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;background:#080c12}
.cam-icon{font-size:40px;opacity:.2}
.cam-placeholder span{font-size:13px;color:var(--text2);font-family:var(--mono)}
.scan-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none}
.scan-frame{width:200px;height:110px;position:relative}
.sf-c{position:absolute;width:20px;height:20px;border-color:var(--green);border-style:solid}
.sf-c.tl{top:0;left:0;border-width:2px 0 0 2px}
.sf-c.tr{top:0;right:0;border-width:2px 2px 0 0}
.sf-c.bl{bottom:0;left:0;border-width:0 0 2px 2px}
.sf-c.br{bottom:0;right:0;border-width:0 2px 2px 0}
.sf-line{position:absolute;left:0;right:0;height:1px;background:var(--green);box-shadow:0 0 6px var(--green);animation:scanMove 1.8s ease-in-out infinite;opacity:.8}
@keyframes scanMove{0%,100%{top:6px}50%{top:100px}}
.ocr-frame{width:260px;height:65px;position:relative}
.of-c{position:absolute;width:18px;height:18px;border-color:var(--orange);border-style:solid}
.of-c.tl{top:0;left:0;border-width:2px 0 0 2px}
.of-c.tr{top:0;right:0;border-width:2px 2px 0 0}
.of-c.bl{bottom:0;left:0;border-width:0 0 2px 2px}
.of-c.br{bottom:0;right:0;border-width:0 2px 2px 0}
.of-line{position:absolute;left:0;right:0;height:1px;background:var(--orange);box-shadow:0 0 6px var(--orange);animation:ocrMove 1.5s ease-in-out infinite;opacity:.8}
@keyframes ocrMove{0%,100%{top:4px}50%{top:58px}}
.of-label{position:absolute;bottom:-20px;left:50%;transform:translateX(-50%);font-family:var(--mono);font-size:10px;color:var(--orange);white-space:nowrap;background:rgba(0,0,0,.7);padding:2px 8px;border-radius:3px}
.status-pill{position:absolute;top:10px;left:50%;transform:translateX(-50%);background:rgba(13,17,23,.85);backdrop-filter:blur(8px);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:11px;font-family:var(--mono);display:flex;align-items:center;gap:6px;white-space:nowrap}
.dot{width:6px;height:6px;border-radius:50%;animation:blink 1.2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.mode-bar{display:flex;padding:10px 14px;gap:8px;background:var(--surface);border-bottom:1px solid var(--border)}
.mode-btn{flex:1;padding:9px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:12px;font-weight:700;cursor:pointer;font-family:var(--sans);transition:all .15s}
.mode-btn.active-bar{background:rgba(63,185,80,.12);border-color:var(--green);color:var(--green)}
.mode-btn.active-ocr{background:rgba(210,153,34,.12);border-color:var(--orange);color:var(--orange)}
.ocr-result{display:none;align-items:center;gap:10px;padding:9px 14px;background:rgba(210,153,34,.07);border-bottom:1px solid rgba(210,153,34,.2)}
.ocr-result.show{display:flex}
.ocr-txt{flex:1;font-family:var(--mono);font-size:13px;color:var(--orange)}
.ocr-apply{background:var(--orange);border:none;border-radius:6px;color:#0d1117;font-size:12px;font-weight:700;padding:6px 12px;cursor:pointer;font-family:var(--sans)}
.ocr-dismiss{background:none;border:none;color:var(--text2);font-size:16px;cursor:pointer;padding:4px}
.manual-bar{display:flex;gap:8px;padding:10px 14px;background:var(--surface);border-bottom:1px solid var(--border)}
.manual-input{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:var(--mono);font-size:13px;padding:9px 12px;outline:none;transition:border-color .15s}
.manual-input:focus{border-color:var(--accent)}
.manual-input::placeholder{color:var(--text2)}
.btn-add{background:var(--accent);border:none;border-radius:6px;color:#0d1117;font-size:13px;font-weight:700;padding:9px 14px;cursor:pointer;font-family:var(--sans)}
.list-wrap{flex:1;overflow-y:auto;padding-bottom:130px}
.list-hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 16px 8px;background:var(--bg);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10}
.list-title{font-family:var(--mono);font-size:13px;font-weight:600}
.list-count{color:var(--accent);margin-left:4px}
.btn-clear{background:none;border:1px solid var(--border);border-radius:5px;color:var(--text2);font-size:11px;padding:4px 9px;cursor:pointer;font-family:var(--sans)}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;padding:60px 20px;color:var(--text2)}
.empty .ei{font-size:40px;opacity:.15}
.empty span{font-family:var(--mono);font-size:12px}
.card{padding:12px 16px;border-bottom:1px solid var(--border);animation:slideIn .2s ease}
@keyframes slideIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.card-top{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.card-emoji{width:40px;height:40px;border-radius:8px;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.card-info{flex:1;min-width:0}
.card-name{font-size:14px;font-weight:700;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-bc{font-family:var(--mono);font-size:10px;color:var(--text2)}
.qty-wrap{display:flex;align-items:center;gap:6px;flex-shrink:0}
.qty-btn{width:26px;height:26px;border-radius:5px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.qty-btn:active{background:var(--accent);border-color:var(--accent);color:#0d1117}
.qty-val{font-family:var(--mono);font-size:14px;font-weight:700;min-width:28px;text-align:center;color:var(--accent)}
.del-btn{width:24px;height:24px;border:none;background:none;color:var(--text2);font-size:14px;cursor:pointer;border-radius:4px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.date-row{display:flex;gap:6px}
.date-chip{flex:1;border-radius:6px;padding:6px 10px;cursor:pointer;border:1px solid}
.date-chip.exp{background:rgba(210,153,34,.07);border-color:rgba(210,153,34,.3)}
.date-chip.dis{background:rgba(248,81,73,.06);border-color:rgba(248,81,73,.25)}
.date-chip.safe{background:rgba(63,185,80,.06);border-color:rgba(63,185,80,.25)}
.dc-label{font-size:9px;font-weight:700;letter-spacing:.5px;font-family:var(--mono);margin-bottom:2px}
.exp .dc-label{color:var(--orange)}
.dis .dc-label{color:var(--red)}
.safe .dc-label{color:var(--green)}
.dc-val{font-family:var(--mono);font-size:11px;font-weight:600}
.dc-empty{font-size:10px;color:var(--text2)}
.dc-dday{font-family:var(--mono);font-size:9px;font-weight:700;margin-top:1px}
.bottom{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;padding:10px 14px 26px;background:var(--surface);border-top:1px solid var(--border);z-index:50}
.btn-row{display:flex;gap:8px;margin-bottom:6px}
.btn-pos{flex:1;background:var(--accent);border:none;border-radius:8px;color:#0d1117;font-size:14px;font-weight:700;padding:13px;cursor:pointer;font-family:var(--sans)}
.btn-csv{background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:12px;font-weight:600;padding:13px 14px;cursor:pointer;font-family:var(--sans);white-space:nowrap}
.hint{text-align:center;font-size:10px;color:var(--text2);font-family:var(--mono)}
.toast{position:fixed;top:72px;left:50%;transform:translateX(-50%);background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 16px;font-size:12px;font-family:var(--mono);font-weight:600;z-index:600;white-space:nowrap;pointer-events:none;transition:opacity .25s}
.toast.hide{opacity:0}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(4px);z-index:300;display:flex;align-items:flex-end;justify-content:center}
.modal{background:var(--surface);border-radius:16px 16px 0 0;border-top:1px solid var(--border);padding:20px 18px 34px;width:100%;max-width:430px;animation:modalUp .25s ease}
@keyframes modalUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-title{font-family:var(--mono);font-size:16px;font-weight:700;margin-bottom:4px}
.modal-sub{font-size:13px;color:var(--text2);margin-bottom:14px;line-height:1.6}
.modal-table{background:var(--surface2);border-radius:8px;padding:10px;margin-bottom:14px;max-height:160px;overflow-y:auto}
.mtr{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px;font-family:var(--mono)}
.mtr:last-child{border-bottom:none}
.modal-actions{display:flex;gap:8px}
.btn-mc{flex:1;padding:12px;border:1px solid var(--border);border-radius:8px;background:none;color:var(--text2);font-size:13px;cursor:pointer;font-family:var(--sans)}
.btn-mok{flex:2;padding:12px;border:none;border-radius:8px;background:var(--accent);color:#0d1117;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--sans)}
.date-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:var(--mono);font-size:14px;padding:10px 12px;outline:none;margin-top:5px;margin-bottom:14px}
.date-input:focus{border-color:var(--orange)}
input[type=date]::-webkit-calendar-picker-indicator{filter:invert(1)}
label.dl{font-size:12px;color:var(--text2);font-weight:600;font-family:var(--mono)}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr">
    <span style="font-size:20px">📦</span>
    <div class="hdr-title">재고관리 스캐너</div>
    <div class="hdr-badge ready" id="badge">READY</div>
  </div>
  <div class="install-banner" id="installBanner">
    <span style="font-size:16px">📲</span>
    <p>홈화면에 앱으로 설치</p>
    <button class="btn-install" id="installBtn">설치</button>
  </div>
  <div class="cam-wrap" id="camWrap">
    <video id="video" muted playsinline style="display:none"></video>
    <canvas id="scanCanvas" style="display:none"></canvas>
    <div class="cam-placeholder" id="camPlaceholder">
      <div class="cam-icon">📷</div>
      <span id="camHint">탭하여 스캔 시작</span>
    </div>
    <div class="scan-overlay" id="scanOverlay" style="display:none">
      <div class="scan-frame">
        <div class="sf-c tl"></div><div class="sf-c tr"></div>
        <div class="sf-c bl"></div><div class="sf-c br"></div>
        <div class="sf-line"></div>
      </div>
    </div>
    <div class="scan-overlay" id="ocrOverlay" style="display:none">
      <div class="ocr-frame">
        <div class="of-c tl"></div><div class="of-c tr"></div>
        <div class="of-c bl"></div><div class="of-c br"></div>
        <div class="of-line"></div>
        <div class="of-label">날짜를 프레임 안에</div>
      </div>
    </div>
    <div class="status-pill">
      <div class="dot" id="dot" style="background:var(--text2)"></div>
      <span id="statusTxt">탭하여 시작</span>
    </div>
  </div>
  <div class="mode-bar">
    <button class="mode-btn active-bar" id="btnBar" onclick="setMode('bar')">▣ 바코드 스캔</button>
    <button class="mode-btn" id="btnOcr" onclick="setMode('ocr')">📅 유통기한 OCR</button>
  </div>
  <div class="ocr-result" id="ocrResult">
    <span class="ocr-txt" id="ocrTxt"></span>
    <button class="ocr-apply" id="ocrApply">적용</button>
    <button class="ocr-dismiss" onclick="document.getElementById('ocrResult').classList.remove('show')">✕</button>
  </div>
  <div class="manual-bar">
    <input class="manual-input" id="manualInput" placeholder="바코드 번호 직접 입력..." maxlength="30">
    <button class="btn-add" onclick="addItem(document.getElementById('manualInput').value.trim())">추가</button>
  </div>
  <div class="list-wrap">
    <div class="list-hdr">
      <div class="list-title">스캔 목록 <span class="list-count" id="listCount">(0)</span></div>
      <button class="btn-clear" onclick="clearAll()">전체 삭제</button>
    </div>
    <div id="listBody"></div>
  </div>
  <div class="bottom">
    <div class="btn-row">
      <button class="btn-pos" onclick="sendPos()">⚡ POS로 전송</button>
      <button class="btn-csv" onclick="exportCsv()">📊 CSV</button>
    </div>
    <div class="hint">바코드 탭 → 스캔 / OCR 탭 → 날짜 촬영</div>
  </div>
</div>
<div class="toast hide" id="toast"></div>
<div id="modalBg" style="display:none" class="modal-bg" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-title" id="modalTitle">날짜 입력</div>
    <div class="modal-sub" id="modalSub"></div>
    <div id="modalContent"></div>
    <div class="modal-actions">
      <button class="btn-mc" onclick="closeModal()">취소</button>
      <button class="btn-mok" id="modalOk">확인</button>
    </div>
  </div>
</div>
<div id="posModalBg" style="display:none" class="modal-bg" onclick="if(event.target===this)closePosModal()">
  <div class="modal">
    <div class="modal-title">📤 POS 전송</div>
    <div class="modal-sub">아래 데이터를 POS 시스템으로 전송합니다.</div>
    <div class="modal-table" id="posTable"></div>
    <div class="modal-actions">
      <button class="btn-mc" onclick="closePosModal()">취소</button>
      <button class="btn-mok" onclick="confirmPos()">전송</button>
    </div>
  </div>
</div>

<script>
var items = JSON.parse(localStorage.getItem('scanItems') || '[]');
var mode = 'bar', scanning = false, stream = null;
var scanInterval = null, ocrInterval = null;
var lastCode = null, lastCodeTime = 0;
var editIdx = null, modalField = null, deferredPrompt = null;
var barcodeDetector = null;

// PWA
window.addEventListener('beforeinstallprompt', function(e) {
  e.preventDefault(); deferredPrompt = e;
  document.getElementById('installBanner').classList.add('show');
});
document.getElementById('installBtn').onclick = async function() {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  await deferredPrompt.userChoice;
  document.getElementById('installBanner').classList.remove('show');
  deferredPrompt = null;
};
if (navigator.serviceWorker) navigator.serviceWorker.register('./sw.js').catch(function(){});

// Check BarcodeDetector support
async function initBarcodeDetector() {
  if ('BarcodeDetector' in window) {
    try {
      var formats = await BarcodeDetector.getSupportedFormats();
      barcodeDetector = new BarcodeDetector({ formats: formats });
      return true;
    } catch(e) {}
  }
  return false;
}

function setMode(m) {
  mode = m;
  document.getElementById('btnBar').className = 'mode-btn' + (m === 'bar' ? ' active-bar' : '');
  document.getElementById('btnOcr').className = 'mode-btn' + (m === 'ocr' ? ' active-ocr' : '');
  if (scanning) {
    stopBarScan(); stopOcrScan();
    document.getElementById('scanOverlay').style.display = 'none';
    document.getElementById('ocrOverlay').style.display = 'none';
    if (m === 'bar') startBarScan(); else startOcrScan();
  }
}

document.getElementById('camWrap').onclick = function() {
  if (!scanning) startCam(); else stopCam();
};

async function startCam() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }
    });
    var video = document.getElementById('video');
    video.srcObject = stream;
    await video.play();
    video.style.display = 'block';
    document.getElementById('camPlaceholder').style.display = 'none';
    scanning = true;
    document.getElementById('badge').textContent = 'LIVE';
    document.getElementById('badge').className = 'hdr-badge live';
    document.getElementById('dot').style.background = 'var(--green)';
    document.getElementById('statusTxt').textContent = mode === 'bar' ? '바코드 스캔 중...' : 'OCR 스캔 중...';
    if (mode === 'bar') startBarScan(); else startOcrScan();
  } catch(e) {
    toast('카메라 권한을 허용해주세요', 'var(--red)');
  }
}

function stopCam() {
  stopBarScan(); stopOcrScan();
  if (stream) { stream.getTracks().forEach(function(t) { t.stop(); }); stream = null; }
  var video = document.getElementById('video');
  video.style.display = 'none'; video.srcObject = null;
  document.getElementById('camPlaceholder').style.display = 'flex';
  document.getElementById('scanOverlay').style.display = 'none';
  document.getElementById('ocrOverlay').style.display = 'none';
  scanning = false;
  document.getElementById('badge').textContent = 'READY';
  document.getElementById('badge').className = 'hdr-badge ready';
  document.getElementById('dot').style.background = 'var(--text2)';
  document.getElementById('statusTxt').textContent = '탭하여 시작';
}

async function startBarScan() {
  document.getElementById('scanOverlay').style.display = 'flex';
  document.getElementById('ocrOverlay').style.display = 'none';

  var hasBD = await initBarcodeDetector();
  var video = document.getElementById('video');

  if (hasBD) {
    // Use native BarcodeDetector API
    scanInterval = setInterval(async function() {
      if (!scanning || !video.videoWidth) return;
      try {
        var barcodes = await barcodeDetector.detect(video);
        if (barcodes && barcodes.length > 0) {
          var code = barcodes[0].rawValue;
          var now = Date.now();
          if (code !== lastCode || now - lastCodeTime > 2000) {
            lastCode = code; lastCodeTime = now;
            addItem(code);
            if (navigator.vibrate) navigator.vibrate(50);
          }
        }
      } catch(e) {}
    }, 200);
  } else {
    // Fallback: load ZXing dynamically
    toast('스캐너 초기화 중...', 'var(--accent)');
    var script = document.createElement('script');
    script.src = 'https://cdn.jsdelivr.net/npm/@zxing/library@0.19.1/umd/index.min.js';
    script.onload = function() {
      try {
        var reader = new ZXing.BrowserMultiFormatReader();
        scanInterval = setInterval(function() {
          if (!scanning || !video.videoWidth) return;
          try {
            var canvas = document.createElement('canvas');
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            var result = reader.decodeFromCanvas(canvas);
            if (result) {
              var code = result.getText();
              var now = Date.now();
              if (code !== lastCode || now - lastCodeTime > 2000) {
                lastCode = code; lastCodeTime = now;
                addItem(code);
                if (navigator.vibrate) navigator.vibrate(50);
              }
            }
          } catch(e) {}
        }, 300);
        toast('스캐너 준비됨', 'var(--green)');
      } catch(e) {
        toast('스캐너 오류: ' + e.message, 'var(--red)');
      }
    };
    script.onerror = function() {
      // Last fallback: try Quagga
      var s2 = document.createElement('script');
      s2.src = 'https://cdn.jsdelivr.net/npm/quagga@0.12.1/dist/quagga.min.js';
      s2.onload = function() {
        Quagga.init({
          inputStream: { type: 'LiveStream', target: video, constraints: { facingMode: 'environment' } },
          locator: { patchSize: 'medium', halfSample: true },
          numOfWorkers: 2, frequency: 10,
          decoder: { readers: ['ean_reader','ean_8_reader','upc_reader','code_128_reader'] },
          locate: true
        }, function(err) {
          if (err) { toast('카메라 초기화 오류', 'var(--red)'); return; }
          Quagga.start();
          Quagga.onDetected(function(r) {
            var code = r && r.codeResult && r.codeResult.code;
            if (!code) return;
            var now = Date.now();
            if (code !== lastCode || now - lastCodeTime > 2000) {
              lastCode = code; lastCodeTime = now;
              addItem(code);
              if (navigator.vibrate) navigator.vibrate(50);
            }
          });
        });
      };
      s2.onerror = function() { toast('라이브러리 로드 실패', 'var(--red)'); };
      document.head.appendChild(s2);
    };
    document.head.appendChild(script);
  }
}

function stopBarScan() {
  if (scanInterval) { clearInterval(scanInterval); scanInterval = null; }
  try { if (window.Quagga) Quagga.stop(); } catch(e) {}
}

function startOcrScan() {
  document.getElementById('scanOverlay').style.display = 'none';
  document.getElementById('ocrOverlay').style.display = 'flex';
  document.getElementById('statusTxt').textContent = 'OCR 스캔 중...';
  var video = document.getElementById('video');
  ocrInterval = setInterval(function() {
    if (!scanning || !video.videoWidth) return;
    var canvas = document.createElement('canvas');
    var vw = video.videoWidth, vh = video.videoHeight;
    var fw = Math.floor(vw * .65), fh = Math.floor(vh * .22);
    canvas.width = fw; canvas.height = fh;
    canvas.getContext('2d').drawImage(video, Math.floor((vw-fw)/2), Math.floor((vh-fh)/2), fw, fh, 0, 0, fw, fh);
    canvas.toBlob(function(blob) {
      if (!blob) return;
      var fr = new FileReader();
      fr.onload = async function() {
        var b64 = fr.result.split(',')[1];
        try {
          var res = await fetch('https://api.anthropic.com/v1/messages', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              model: 'claude-sonnet-4-20250514', max_tokens: 100,
              messages: [{ role: 'user', content: [
                { type: 'image', source: { type: 'base64', media_type: 'image/jpeg', data: b64 } },
                { type: 'text', text: '이 이미지에서 날짜(유통기한)만 찾아서 YYYY-MM-DD 형식으로만 답해. 날짜가 없으면 "없음"이라고만 답해.' }
              ]}]
            })
          });
          var data = await res.json();
          var txt = data.content && data.content[0] ? data.content[0].text.trim() : '';
          if (txt && txt !== '없음' && /\d{4}-\d{2}-\d{2}/.test(txt)) {
            var date = txt.match(/\d{4}-\d{2}-\d{2}/)[0];
            stopOcrScan();
            document.getElementById('ocrTxt').textContent = '📅 ' + date;
            document.getElementById('ocrResult').classList.add('show');
            document.getElementById('ocrApply').onclick = function() {
              if (items.length > 0) openDateModal(items.length - 1, 'exp', date);
              document.getElementById('ocrResult').classList.remove('show');
            };
            if (navigator.vibrate) navigator.vibrate(100);
          }
        } catch(e) {}
      };
      fr.readAsDataURL(blob);
    }, 'image/jpeg', .8);
  }, 2500);
}

function stopOcrScan() { if (ocrInterval) { clearInterval(ocrInterval); ocrInterval = null; } }

async function lookupProduct(code) {
  try {
    var res = await fetch('https://world.openfoodfacts.org/api/v0/product/' + code + '.json');
    var data = await res.json();
    if (data.status === 1 && data.product) {
      var p = data.product;
      var name = p.product_name_ko || p.product_name || p.brands || null;
      if (name) return name.substring(0, 30);
    }
  } catch(e) {}
  return null;
}

async function addItem(code) {
  if (!code) return;
  var idx = items.findIndex(function(i) { return i.code === code; });
  if (idx >= 0) { items[idx].qty++; saveAndRender(); toast('수량 +1: ' + (items[idx].name||code), 'var(--green)'); return; }
  
  toast('🔍 상품 조회 중...', 'var(--accent)');
  var productName = await lookupProduct(code);
  var name = productName || ('상품 ' + code.slice(-4));
  
  items.unshift({ code: code, name: name, qty: 1, exp: '', dis: '', safe: '', ts: Date.now() });
  document.getElementById('manualInput').value = '';
  saveAndRender(); toast('✅ ' + name, 'var(--green)');
}

function saveAndRender() { localStorage.setItem('scanItems', JSON.stringify(items)); renderList(); }

var EMOJIS = ['📦','🧴','🥤','🍫','🧃','🍕','🥛','🧆','🫙','🍱'];
function getEmoji(code) { return EMOJIS[parseInt(code.slice(-1) || 0) % EMOJIS.length]; }

function dday(d) {
  if (!d) return '';
  var diff = Math.ceil((new Date(d) - new Date()) / 86400000);
  if (diff < 0) return '<span style="color:var(--red)">D+' + Math.abs(diff) + '</span>';
  if (diff === 0) return '<span style="color:var(--red)">D-Day</span>';
  if (diff <= 3) return '<span style="color:var(--orange)">D-' + diff + '</span>';
  return '<span style="color:var(--green)">D-' + diff + '</span>';
}

function renderList() {
  var body = document.getElementById('listBody');
  document.getElementById('listCount').textContent = '(' + items.length + ')';
  if (!items.length) { body.innerHTML = '<div class="empty"><div class="ei">📦</div><span>스캔한 상품이 없습니다</span></div>'; return; }
  body.innerHTML = items.map(function(item, i) {
    var displayName = item.name || ('상품 ' + item.code.slice(-4));
    return '<div class="card"><div class="card-top"><div class="card-emoji">' + getEmoji(item.code) + '</div><div class="card-info"><div class="card-name">' + displayName + '</div><div class="card-bc">' + item.code + '</div></div><div class="qty-wrap"><button class="qty-btn" onclick="changeQty(' + i + ',-1)">−</button><div class="qty-val">' + item.qty + '</div><button class="qty-btn" onclick="changeQty(' + i + ',1)">+</button></div><button class="del-btn" onclick="deleteItem(' + i + ')">✕</button></div><div class="date-row"><div class="date-chip exp" onclick="openDateModal(' + i + ',\'exp\')"><div class="dc-label">유통기한</div>' + (item.exp ? '<div class="dc-val">' + item.exp + '</div><div class="dc-dday">' + dday(item.exp) + '</div>' : '<div class="dc-empty">탭하여 입력</div>') + '</div><div class="date-chip dis" onclick="openDateModal(' + i + ',\'dis\')"><div class="dc-label">진열기한</div>' + (item.dis ? '<div class="dc-val">' + item.dis + '</div><div class="dc-dday">' + dday(item.dis) + '</div>' : '<div class="dc-empty">탭하여 입력</div>') + '</div><div class="date-chip safe" onclick="openDateModal(' + i + ',\'safe\')"><div class="dc-label">안전기한</div>' + (item.safe ? '<div class="dc-val">' + item.safe + '</div><div class="dc-dday">' + dday(item.safe) + '</div>' : '<div class="dc-empty">탭하여 입력</div>') + '</div></div></div>';
  }).join('');
}

function changeQty(i, d) { items[i].qty = Math.max(0, items[i].qty + d); if (items[i].qty === 0) { deleteItem(i); return; } saveAndRender(); }
function deleteItem(i) { items.splice(i, 1); saveAndRender(); }
function clearAll() { if (!items.length) return; if (confirm('목록을 모두 삭제하시겠습니까?')) { items = []; saveAndRender(); } }

function openDateModal(idx, field, prefill) {
  editIdx = idx; modalField = field;
  var labels = { exp: '유통기한', dis: '진열기한', safe: '안전기한' };
  var cur = prefill || items[idx][field] || '';
  document.getElementById('modalTitle').textContent = labels[field] + ' 입력';
  document.getElementById('modalSub').textContent = items[idx].code;
  document.getElementById('modalContent').innerHTML = '<label class="dl">' + labels[field] + '</label><input class="date-input" type="date" id="dateInput" value="' + cur + '">';
  document.getElementById('modalOk').onclick = function() {
    items[editIdx][modalField] = document.getElementById('dateInput').value;
    saveAndRender(); toast('저장됨', 'var(--green)'); closeModal();
  };
  document.getElementById('modalBg').style.display = 'flex';
}

function closeModal() { document.getElementById('modalBg').style.display = 'none'; }
function sendPos() {
  if (!items.length) { toast('스캔된 상품이 없습니다', 'var(--orange)'); return; }
  document.getElementById('posTable').innerHTML = items.map(function(item) { return '<div class="mtr"><span>' + item.code + '</span><span style="color:var(--accent)">× ' + item.qty + '</span></div>'; }).join('');
  document.getElementById('posModalBg').style.display = 'flex';
}
function closePosModal() { document.getElementById('posModalBg').style.display = 'none'; }
function confirmPos() { toast('POS 전송 완료 ✓', 'var(--green)'); closePosModal(); }
function exportCsv() {
  if (!items.length) { toast('데이터가 없습니다', 'var(--orange)'); return; }
  var rows = ['바코드,수량,유통기한,진열기한,안전기한,스캔시간'];
  items.forEach(function(item) { rows.push([item.code, item.qty, item.exp||'', item.dis||'', item.safe||'', new Date(item.ts).toLocaleString('ko-KR')].join(',')); });
  var blob = new Blob(['\uFEFF' + rows.join('\n')], { type: 'text/csv;charset=utf-8;' });
  var a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = '재고_' + new Date().toISOString().slice(0,10) + '.csv'; a.click();
  toast('CSV 저장됨', 'var(--green)');
}

var toastTimer;
function toast(msg, color) {
  var el = document.getElementById('toast');
  el.textContent = msg; el.style.color = color || 'var(--text)';
  el.classList.remove('hide'); clearTimeout(toastTimer);
  toastTimer = setTimeout(function() { el.classList.add('hide'); }, 2500);
}

document.getElementById('manualInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') addItem(e.target.value.trim());
});

renderList();
</script>
</body>
</html>
